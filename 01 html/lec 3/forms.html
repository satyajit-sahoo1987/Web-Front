    <title>Document</title>

  <body>
    <div style="color: white">
      <h2 style="background-color: green">Search on Flipkart</h2>
      <form action="https://www.flipkart.com/search">
        <input type="text" name="q" placeholder="Search your product..." />
        <!-- querry string -->
        <!-- key=q(key defined by the user using the "name" attribute) -->
        <!-- Entered by the user in the input box -->
        <!-- name attribute required for use a key value pair-->
        <button>Submit</button>
      </form>
      <br />
      <br />
