<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.profile {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    /* height: 300px; */
    
    
}
.box {
    height: 300px;
    width: 23%;
    background-color: white;
    padding:0 0 ;
    margin-top: 0px;
    border: 2px solid black;
margin-left: 10px;
transition: all .5s ease .1s;
border-radius: 5px;
}
.box:hover{
box-shadow:2px 2px 5px black ;    
}

.box-img {
    height: 200px;
    border-radius: 50%;
    background-size: cover;
    margin-top: 1rem;
    margin-bottom: 1rem;
    
}

.box-content {
    
    margin-left: 10px;
    margin-right: 10px;
    padding: 5px;
}
.box-content p {
    color: #007185;
    
}
div h4{
    border-top: 2px solid black;
    
}


         
           
    </style>
</head>
<body>
    <div class="profile">
        <div class=" box">
            <div class="box-content">
                
                <div class="box-img" style="background-image: url('./male.jpg');"></div>
                <h4>Satyajit Sahoo</h4>
                <p>Web Developer</p>
            </div>
        </div>
        <div class=" box">
            <div class="box-content">
                
                <div class="box-img" style="background-image: url('./female.jpg');"></div>
                <h4>Barsha Priyadarshini</h4>
                <p>Web Developer</p>
            </div>
        </div>
    </div>
</body>
</html>
