<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: white;
        }
        .face{
            height: 350px;
            width:350px ;
            background-color: #f4d000;
            border-radius: 50%;
            position: relative;
        }
        .eye{
            width: 40px;
            height: 40px;
            background-color: black;
            border-radius: 50%;
            position: absolute;
        }
        .left-eye{
            left: 80px;
            top: 90px;
        }
        .right-eye{
            right:80px;
            top: 90px;
        }
        .nose{
            height: 50px;
            width: 20px;
            background-color: brown;
            border-radius: 50%;
            position: absolute;
            top: 150px;
            left: 165px;
        }
        .mouth{
            width: 160px;
            height: 30px;
            background-color: darkred;
            position: absolute;
            left: 95px;
            top: 230px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }
    </style>
</head>
<body>
    <div class="face">
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="nose"></div>
        <div class="mouth"></div>
    </div>
</body>
</html>
