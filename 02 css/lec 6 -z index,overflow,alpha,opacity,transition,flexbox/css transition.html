<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-color: green;
            transition-duration: 1s;
            transition-delay: .2s;
            transition-timing-function: linear;
        }
        div:hover{
            background-color: black;
            border-radius: 50%;
            color: red;
            font-size: 24px;
            padding-left: 30px;
            padding-top: 20px;
        }
        div:hover::after{
            content:"Satya"
        }
        section{
            
            height: 200px;
            width: 200px;
            background-color: aqua;
            margin-top: 0 auto;
            transition: all 2s ease 0.2s;
            /* transition-duration: 2s; */
        }
        section:hover{
            margin-top: 200px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div></div>
    <section></section>
</body>
</html>
